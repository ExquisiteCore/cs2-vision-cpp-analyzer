# Runtime values are loaded before CLI flags, so command-line options can override them.
backend=opencv-onnx
input=dxgi
dxgi_adapter=0
dxgi_output=0
dxgi_timeout_ms=16
dxgi_gpu_preference=default

# Set width/height to 0 to disable ROI. Coordinates are relative to the selected output.
dxgi_roi_x=0
dxgi_roi_y=0
dxgi_roi_width=0
dxgi_roi_height=0

hid_gain=1.0
hid_max_step=120
hid_deadzone_px=1.5
hid_click=false
hid_click_cooldown_frames=6

body_head_anchor_ratio=0.18
kalman_process_noise=0.08
kalman_measurement_noise=6.0
kalman_error_covariance=8.0

calibration_step_counts=40
calibration_repeats=3
calibration_settle_ms=120

status_every_frames=30
